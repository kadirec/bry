name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "key fingerprint:"
          ssh-keygen -lf ~/.ssh/id_ed25519 || echo "could not read key"
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          attempt=1
          max_attempts=3
          until ssh \
                  -o ConnectTimeout=30 \
                  -o ServerAliveInterval=15 \
                  -o ServerAliveCountMax=8 \
                  -o BatchMode=yes \
                  -o StrictHostKeyChecking=accept-new \
                  -i ~/.ssh/id_ed25519 \
                  ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash <<'EOF'
            set -euo pipefail
            cd /var/www/bry-cms
            git pull --ff-only origin main
            composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist
            npm ci --no-audit --no-fund
            npm run build
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan storage:link || true
          EOF
          do
            status=$?
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "Deploy failed after $attempt attempts (exit $status)"
              exit "$status"
            fi
            echo "Deploy attempt $attempt failed (exit $status), retrying in 30s..."
            attempt=$((attempt + 1))
            sleep 30
          done
